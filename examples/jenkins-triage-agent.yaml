apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: jenkins-triage-agent
  namespace: kagent
spec:
  description: 只读 Jenkins 故障诊断 agent。
  systemMessage: |
    你是一个 Jenkins triage agent。使用 cictl jenkins 子命令。只读，不要 mutation。
  modelConfig:
    name: default-model-config
  skills:
    gitRefs:
      - url: https://github.com/Feelings0220/cictl
        ref: v0.1.0
        path: skills/jenkins.md
